<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퀴즈 · 유럽 가족 여행 준비 Quiz</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="timer-bar" class="timer-bar" hidden>
      <span class="timer-label">남은 시간</span>
      <span id="timer" class="timer">10:00</span>
      <div class="quiz-progress">
        <div class="quiz-progress-track">
          <div id="quiz-progress-fill" class="quiz-progress-fill"></div>
        </div>
        <span id="quiz-progress-text" class="quiz-progress-text">0 / 0 답함</span>
      </div>
    </div>

    <main class="container">
      <h2 id="quiz-title" class="page-title">불러오는 중…</h2>
      <p id="quiz-subtitle" class="page-subtitle"></p>

      <form id="quiz-form"></form>

      <div id="submit-area" hidden>
        <button id="submit-quiz" class="btn btn-primary btn-block">
          제출하기
        </button>
      </div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/config.js"></script>
    <script src="js/util.js"></script>
    <script src="js/data.js"></script>
    <script src="js/quiz.js"></script>
  </body>
</html>
