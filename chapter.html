<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학습 · 유럽 가족 여행 준비 Quiz</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="topbar">
      <a id="back-link" class="back-link" href="index.html">‹ 챕터 목록</a>
    </div>

    <main class="container">
      <h2 id="chapter-title" class="page-title">불러오는 중…</h2>
      <p id="chapter-subtitle" class="page-subtitle"></p>

      <div id="sections"></div>

      <div id="start-area" class="start-area" hidden>
        <button id="start-quiz" class="btn btn-primary btn-block">
          📝 퀴즈 테스트 시작하기
        </button>
        <p id="prep-note" class="prep-note" hidden>
          이 챕터는 아직 문제가 준비되지 않았습니다.
        </p>
      </div>
    </main>

    <!-- PIN 모달 -->
    <div id="pin-modal" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="pin-title">
        <h3 id="pin-title">🔒 PIN 입력</h3>
        <p>퀴즈를 시작하려면 가족 PIN을 입력하세요.</p>
        <input
          id="pin-input"
          class="pin-input"
          type="password"
          inputmode="numeric"
          autocomplete="off"
          maxlength="8"
          placeholder="••••"
        />
        <div id="pin-error" class="pin-error" role="alert"></div>
        <div class="btn-row">
          <button id="pin-cancel" class="btn btn-secondary">취소</button>
          <button id="pin-confirm" class="btn btn-primary">확인</button>
        </div>
      </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/config.js"></script>
    <script src="js/util.js"></script>
    <script src="js/data.js"></script>
    <script src="js/chapter.js"></script>
  </body>
</html>
