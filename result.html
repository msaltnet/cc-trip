<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>결과 · 유럽 가족 여행 준비 Quiz</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <div id="score-card" class="score-card" hidden>
        <div id="score-num" class="score-num"></div>
        <div id="score-label" class="score-label"></div>
      </div>

      <div id="review"></div>

      <div id="actions" hidden>
        <button id="share" class="btn btn-primary btn-block">📤 결과 공유하기</button>
        <div class="btn-row">
          <a id="retry" class="btn btn-secondary">다시 풀기</a>
          <a id="home" class="btn btn-secondary" href="index.html">목차로</a>
        </div>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/config.js"></script>
    <script src="js/util.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/result.js"></script>
  </body>
</html>
